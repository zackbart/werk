<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>werk</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f0883e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--text); }
  .tabs { display: flex; gap: 2px; }
  .tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-muted); border: none; background: none; transition: all 0.15s; font-weight: 500; }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .tab.active { color: var(--text); background: rgba(255,255,255,0.1); }
  .stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }
  .stat-val { font-weight: 600; color: var(--text); }

  /* Board */
  .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; height: calc(100vh - 49px); overflow: hidden; }
  .column { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .column-header { padding: 12px 16px; font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--border); border-radius: 8px 8px 0 0; }
  .col-blocked .column-header { border-top-color: var(--red); }
  .col-ready .column-header { border-top-color: var(--accent); }
  .col-in-progress .column-header { border-top-color: var(--yellow); }
  .col-closed .column-header { border-top-color: var(--green); }
  .column-header .count { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-left: 8px; }
  .column-cards { padding: 8px; overflow-y: auto; flex: 1; }

  .today-toggle { font-size: 11px; padding: 3px 10px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text-muted); transition: all 0.15s; }
  .today-toggle.active { background: rgba(63,185,80,0.15); color: var(--green); border-color: rgba(63,185,80,0.3); }

  .card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: var(--accent); }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
  .card-meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--text-muted); flex-wrap: wrap; }
  .card-id { font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace; font-size: 11px; }
  .card-epic { color: var(--purple); font-size: 11px; }

  .priority-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .priority-0 { background: rgba(248,81,73,0.2); color: var(--red); }
  .priority-1 { background: rgba(240,136,62,0.2); color: var(--orange); }
  .priority-2 { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .priority-3 { background: rgba(139,148,158,0.1); color: var(--text-muted); }
  .priority-4 { background: rgba(139,148,158,0.07); color: var(--text-muted); }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .status-open { background: var(--text-muted); }
  .status-in_progress { background: var(--yellow); }
  .status-blocked { background: var(--red); }
  .status-done { background: var(--green); }

  .epic-label { font-size: 11px; color: var(--purple); padding: 6px 8px 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

  .blocker-badge { color: var(--red); font-size: 11px; }

  /* Epics view */
  #epics-view { height: calc(100vh - 49px); overflow-y: auto; }
  .epics-container { padding: 24px; max-width: 960px; margin: 0 auto; }
  .epic-accordion { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .epic-accordion-header { padding: 14px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; user-select: none; }
  .epic-accordion-header:hover { background: rgba(255,255,255,0.02); }
  .epic-acc-left { display: flex; align-items: center; gap: 10px; }
  .chevron { color: var(--text-muted); font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .epic-accordion.open .chevron { transform: rotate(90deg); }
  .epic-acc-title { font-weight: 600; font-size: 14px; }
  .epic-acc-right { display: flex; align-items: center; gap: 12px; }
  .epic-progress { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .epic-progress-bar { width: 64px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .epic-progress-fill { height: 100%; background: var(--green); transition: width 0.3s; }
  .epic-tasks { display: none; border-top: 1px solid var(--border); }
  .epic-accordion.open .epic-tasks { display: block; }
  .epic-task-row { padding: 10px 20px 10px 36px; border-bottom: 1px solid rgba(48,54,61,0.4); cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; transition: background 0.1s; }
  .epic-task-row:hover { background: rgba(255,255,255,0.02); }
  .task-title-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-deps { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; flex-shrink: 0; }
  .task-deps .dep-blocked-by { color: var(--red); }
  .task-deps .dep-blocks { color: var(--orange); }
  .subtask-toggle { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: 1px solid rgba(88,166,255,0.2); padding: 2px 8px; border-radius: 4px; flex-shrink: 0; transition: all 0.15s; }
  .subtask-toggle:hover { background: rgba(88,166,255,0.1); }
  .subtask-list { border-top: 1px solid rgba(48,54,61,0.3); }
  .subtask-row { padding: 8px 20px 8px 56px; font-size: 12px; display: flex; align-items: center; gap: 8px; color: var(--text-muted); border-bottom: 1px solid rgba(48,54,61,0.2); }
  .subtask-row:last-child { border-bottom: none; }
  .epic-notes { font-size: 12px; color: var(--text-muted); padding: 0 20px 12px 36px; line-height: 1.4; }

  /* Tree view */
  .tree-container { height: calc(100vh - 49px); overflow-y: auto; padding: 20px 24px; }
  .tree-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
  .tree-toolbar label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .tree-toolbar input[type="checkbox"] { accent-color: var(--accent); }
  .tree-list { list-style: none; }
  .tree-item { border-left: 2px solid var(--border); margin-left: 0; }
  .tree-item.depth-0 { border-left: none; margin-bottom: 8px; }
  .tree-item.depth-1 { margin-left: 24px; }
  .tree-item.depth-2 { margin-left: 24px; }
  .tree-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: background 0.12s; font-size: 13px; }
  .tree-row:hover { background: rgba(255,255,255,0.04); }
  .tree-toggle { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text-muted); flex-shrink: 0; transition: transform 0.15s; user-select: none; }
  .tree-toggle.open { transform: rotate(90deg); }
  .tree-toggle.leaf { visibility: hidden; }
  .tree-icon { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tree-icon.epic { border-radius: 2px; transform: rotate(45deg); width: 9px; height: 9px; }
  .tree-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-title.done { text-decoration: line-through; opacity: 0.5; }
  .tree-ref { font-size: 11px; color: var(--text-muted); font-family: monospace; flex-shrink: 0; }
  .tree-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }
  .tree-badge.status-open { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .tree-badge.status-in_progress { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tree-badge.status-blocked { background: rgba(248,81,73,0.15); color: var(--red); }
  .tree-badge.status-done { background: rgba(63,185,80,0.15); color: var(--green); }
  .tree-progress { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
  .tree-dep-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
  .tree-dep-badge.blocking { background: rgba(248,81,73,0.12); color: var(--red); }
  .tree-dep-badge.resolved { background: rgba(63,185,80,0.12); color: var(--green); }
  .tree-children { overflow: hidden; transition: max-height 0.2s ease; }
  .tree-children.collapsed { max-height: 0 !important; }

  /* Decisions */
  #decisions-view { height: calc(100vh - 49px); overflow-y: auto; }
  .decisions-container { padding: 24px; max-width: 800px; margin: 0 auto; }
  .decision-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .decision-card h3 { font-size: 14px; margin-bottom: 8px; }
  .decision-card p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .decision-meta { font-size: 11px; color: var(--text-muted); margin-top: 10px; display: flex; gap: 8px; align-items: center; }

  /* Audit drawer */
  .drawer-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; }
  .drawer-overlay.open { display: block; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 480px; background: var(--surface); border-left: 1px solid var(--border); z-index: 101; transform: translateX(100%); transition: transform 0.2s ease; overflow-y: auto; }
  .drawer.open { transform: translateX(0); }
  .drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .drawer-header h2 { font-size: 15px; }
  .drawer-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 4px 8px; }
  .drawer-close:hover { color: var(--text); }
  .drawer-body { padding: 16px 20px; }
  .drawer-task-info { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .drawer-task-info h3 { font-size: 15px; margin-bottom: 6px; }
  .drawer-task-info .meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
  .audit-entry { padding: 8px 0; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 13px; }
  .audit-entry:last-child { border-bottom: none; }
  .audit-field { font-weight: 600; color: var(--accent); }
  .audit-time { color: var(--text-muted); font-size: 11px; }
  .audit-by { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
  .audit-by-agent { background: rgba(188,140,255,0.2); color: var(--purple); }
  .audit-by-human { background: rgba(88,166,255,0.2); color: var(--accent); }
  .audit-values { margin-top: 4px; font-size: 12px; color: var(--text-muted); }
  .audit-old { text-decoration: line-through; }
  .audit-new { color: var(--green); }

  .view { display: none; }
  .view.active { display: block; }
  .empty-state { color: var(--text-muted); text-align: center; padding: 60px 20px; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>werk</span></h1>
  <div class="tabs">
    <button class="tab active" data-view="board">Board</button>
    <button class="tab" data-view="epics">Epics</button>
    <button class="tab" data-view="graph">Tree</button>
    <button class="tab" data-view="decisions">Decisions</button>
    <button class="tab" data-view="sessions">Sessions</button>
  </div>
  <input type="text" id="search-input" placeholder="Search..." style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-size:12px;width:160px;outline:none;" oninput="applySearch()">
  <div class="stats" id="stats"></div>
</div>

<div id="board-view" class="view active">
  <div class="board">
    <div class="column col-blocked">
      <div class="column-header">Blocked <span class="count" id="count-blocked">0</span></div>
      <div class="column-cards" id="col-blocked"></div>
    </div>
    <div class="column col-ready">
      <div class="column-header">Ready <span class="count" id="count-ready">0</span></div>
      <div class="column-cards" id="col-ready"></div>
    </div>
    <div class="column col-in-progress">
      <div class="column-header">In Progress <span class="count" id="count-in_progress">0</span></div>
      <div class="column-cards" id="col-in_progress"></div>
    </div>
    <div class="column col-closed">
      <div class="column-header">
        <span>Closed <span class="count" id="count-closed">0</span></span>
        <button class="today-toggle" id="today-toggle" onclick="toggleToday()">Today</button>
      </div>
      <div class="column-cards" id="col-closed"></div>
    </div>
  </div>
</div>

<div id="epics-view" class="view">
  <div class="epics-container" id="epics-list"></div>
</div>

<div id="graph-view" class="view">
  <div class="tree-container">
    <div class="tree-toolbar">
      <label><input type="checkbox" id="tree-show-done" onchange="renderTree()"> Show done</label>
      <label><input type="checkbox" id="tree-show-deps" checked onchange="renderTree()"> Show dependencies</label>
      <button onclick="collapseDone()" style="font-size:12px;color:var(--text-muted);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;">Collapse done</button>
    </div>
    <ul class="tree-list" id="tree-root"></ul>
  </div>
</div>

<div id="decisions-view" class="view">
  <div class="decisions-container" id="decisions-list"></div>
</div>

<div id="sessions-view" class="view" style="height:calc(100vh - 49px);overflow-y:auto;padding:16px;">
  <div id="sessions-list"></div>
</div>

<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>Details</h2>
    <button class="drawer-close" id="drawer-close">&times;</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
const API = '';
let epics = {}, epicList = [], tasks = [], allTasks = [], allSubtasks = [], deps = [], decisions = [], sessions = [];
let todayFilter = false;
let searchQuery = '';

const priorityLabels = ['Critical', 'High', 'Normal', 'Low', 'Backlog'];
const statusColors = { open: '#8b949e', in_progress: '#d29922', blocked: '#f85149', done: '#3fb950' };

// ── Data layer ──

async function fetchJSON(url) {
  const res = await fetch(API + url);
  return res.json();
}

function computeColumns(taskList, depList) {
  const taskMap = {};
  [...Object.values(epics), ...taskList].forEach(t => taskMap[t.id] = t);

  const columns = { blocked: [], ready: [], in_progress: [], closed: [] };
  taskList.forEach(t => {
    if (t.status === 'done') {
      columns.closed.push(t);
    } else if (t.status === 'in_progress') {
      columns.in_progress.push(t);
    } else if (t.status === 'blocked') {
      columns.blocked.push(t);
    } else if (t.status === 'open') {
      const hasOpenBlocker = depList.some(d =>
        d.downstream_id === t.id &&
        taskMap[d.upstream_id] &&
        taskMap[d.upstream_id].status !== 'done'
      );
      columns[hasOpenBlocker ? 'blocked' : 'ready'].push(t);
    }
  });
  return columns;
}

async function loadData() {
  const [status, eList, taskList, subList, decList, depList, sessList] = await Promise.all([
    fetchJSON('/api/status'),
    fetchJSON('/api/epics'),
    fetchJSON('/api/tasks?status=all'),
    fetchJSON('/api/subtasks'),
    fetchJSON('/api/decisions'),
    fetchJSON('/api/dependencies'),
    fetchJSON('/api/sessions'),
  ]);

  epics = {};
  epicList = eList || [];
  epicList.forEach(e => epics[e.id] = e);
  tasks = taskList || [];
  allSubtasks = subList || [];
  allTasks = [...epicList, ...tasks, ...allSubtasks];
  deps = depList || [];
  decisions = decList || [];
  sessions = sessList || [];

  const columns = computeColumns(tasks, deps);

  // Stats
  document.getElementById('stats').innerHTML =
    `<span><span class="stat-val">${columns.blocked.length}</span> blocked</span>` +
    `<span><span class="stat-val">${columns.ready.length}</span> ready</span>` +
    `<span><span class="stat-val">${columns.in_progress.length}</span> active</span>` +
    `<span><span class="stat-val">${columns.closed.length}</span> closed</span>`;

  const activeView = document.querySelector('.tab.active')?.dataset.view;
  if (activeView === 'board' || !activeView) renderBoard(columns);
  if (activeView === 'epics') renderEpics();
  if (activeView === 'decisions') renderDecisions();
  if (activeView === 'sessions') renderSessions();
  if (activeView === 'graph') refreshGraphData();
}

// ── Board ──

function renderBoard(columns) {
  if (!columns) columns = computeColumns(tasks, deps);

  ['blocked', 'ready', 'in_progress', 'closed'].forEach(col => {
    const el = document.getElementById('col-' + col);
    el.innerHTML = '';

    let items = columns[col];
    if (col === 'closed' && todayFilter) {
      const today = new Date().toISOString().slice(0, 10);
      items = items.filter(t => t.closed_at && t.closed_at.slice(0, 10) === today);
    }

    document.getElementById('count-' + col).textContent = items.length;

    // Group by epic
    const byEpic = {};
    items.forEach(t => {
      const eid = t.parent_id || '_none';
      if (!byEpic[eid]) byEpic[eid] = [];
      byEpic[eid].push(t);
    });

    Object.keys(byEpic).forEach(eid => {
      if (eid !== '_none' && epics[eid]) {
        const label = document.createElement('div');
        label.className = 'epic-label';
        label.textContent = epics[eid].title;
        el.appendChild(label);
      }
      byEpic[eid].forEach(t => el.appendChild(createCard(t)));
    });
  });
}

function createCard(t) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openDrawer(t.id);

  const blockerCount = deps.filter(d => d.downstream_id === t.id).length;
  const blockerBadge = blockerCount > 0
    ? `<span class="blocker-badge">${blockerCount} blocker${blockerCount > 1 ? 's' : ''}</span>` : '';

  card.innerHTML = `
    <div class="card-title">${esc(t.title)}</div>
    <div class="card-meta">
      <span class="card-id">${t.id}</span>
      <span class="priority-badge priority-${t.priority}">${priorityLabels[t.priority]}</span>
      ${blockerBadge}
    </div>`;
  return card;
}

function toggleToday() {
  todayFilter = !todayFilter;
  document.getElementById('today-toggle').classList.toggle('active', todayFilter);
  renderBoard();
}

// ── Epics ──

const _epicAccOpen = new Set();

function renderEpics() {
  const container = document.getElementById('epics-list');
  const openEpics = epicList.filter(e => e.status !== 'done');

  if (!openEpics.length) {
    container.innerHTML = '<p class="empty-state">No open epics.</p>';
    return;
  }

  container.innerHTML = openEpics.map(epic => {
    const epicTasks = tasks.filter(t => t.parent_id === epic.id);
    const doneCount = epicTasks.filter(t => t.status === 'done').length;
    const total = epicTasks.length;
    const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;

    const taskRows = epicTasks.map(t => {
      const blockedBy = deps.filter(d => d.downstream_id === t.id).map(d => d.upstream_id);
      const blocks = deps.filter(d => d.upstream_id === t.id).map(d => d.downstream_id);
      const depParts = [];
      blockedBy.forEach(id => depParts.push(`<span class="dep-blocked-by">blocked by ${id}</span>`));
      blocks.forEach(id => depParts.push(`<span class="dep-blocks">blocks ${id}</span>`));

      // Inline subtasks for this task
      const subs = allSubtasks.filter(s => s.parent_id === t.id);
      const subsHtml = subs.length ? subs.map(s => `
        <div class="subtask-row">
          <span class="status-dot status-${s.status}"></span>
          <span style="flex:1">${esc(s.title)}</span>
          <span class="card-id">${s.id}</span>
        </div>`).join('') : '';

      return `<div class="epic-task-row" onclick="openDrawer('${t.id}')">
        <span class="status-dot status-${t.status}"></span>
        <span class="task-title-text">${esc(t.title)}</span>
        <span class="card-id">${t.id}</span>
        <span class="priority-badge priority-${t.priority}">${priorityLabels[t.priority]}</span>
        <span class="task-deps">${depParts.join('')}</span>
      </div>${subsHtml ? `<div class="subtask-list" style="display:block">${subsHtml}</div>` : ''}`;
    }).join('');

    const statusDot = epicTasks.some(t => t.status === 'in_progress') ? 'in_progress'
      : epicTasks.some(t => t.status === 'blocked') ? 'blocked' : 'open';

    const isOpen = _epicAccOpen.has(epic.id);
    return `<div class="epic-accordion${isOpen ? ' open' : ''}" id="epic-acc-${epic.id}">
      <div class="epic-accordion-header" onclick="toggleEpicAcc('${epic.id}')">
        <div class="epic-acc-left">
          <span class="chevron">&#9654;</span>
          <span class="status-dot status-${statusDot}"></span>
          <span class="epic-acc-title">${esc(epic.title)}</span>
        </div>
        <div class="epic-acc-right">
          <span class="epic-progress">
            ${doneCount}/${total}
            <span class="epic-progress-bar"><span class="epic-progress-fill" style="width:${pct}%"></span></span>
          </span>
          <span class="priority-badge priority-${epic.priority}">${priorityLabels[epic.priority]}</span>
        </div>
      </div>
      ${epic.notes ? `<div class="epic-notes" style="display:${isOpen ? 'block' : 'none'}" id="epic-notes-${epic.id}">${esc(epic.notes)}</div>` : ''}
      <div class="epic-tasks">${taskRows || '<div class="empty-state" style="padding:20px">No tasks in this epic.</div>'}</div>
    </div>`;
  }).join('');
}

function toggleEpicAcc(epicId) {
  const el = document.getElementById('epic-acc-' + epicId);
  el.classList.toggle('open');
  if (el.classList.contains('open')) _epicAccOpen.add(epicId); else _epicAccOpen.delete(epicId);
  const notes = document.getElementById('epic-notes-' + epicId);
  if (notes) notes.style.display = el.classList.contains('open') ? 'block' : 'none';
}

// ── Decisions ──

function renderDecisions() {
  const container = document.getElementById('decisions-list');
  if (!decisions.length) {
    container.innerHTML = '<p class="empty-state">No decisions recorded yet.</p>';
    return;
  }
  container.innerHTML = decisions.map(d => `
    <div class="decision-card">
      <h3>${esc(d.summary)}</h3>
      ${d.rationale ? `<p>${esc(d.rationale)}</p>` : ''}
      <div class="decision-meta">
        <span class="card-id">${d.id}</span>
        <span>${d.created_at}</span>
        <span class="audit-by audit-by-${d.created_by}">${d.created_by}</span>
      </div>
    </div>`).join('');
}

// ── Tree View ──

let _treeOpenState = {};

function renderTree() {
  const root = document.getElementById('tree-root');
  const showDone = document.getElementById('tree-show-done').checked;
  const showDeps = document.getElementById('tree-show-deps').checked;

  // Build lookup maps
  const taskMap = {};
  allTasks.forEach(t => taskMap[t.id] = t);

  // Build dependency lookup
  const blockedByMap = {};  // id → [upstream items that block it]
  const blocksMap = {};     // id → [downstream items it blocks]
  deps.forEach(d => {
    if (!blockedByMap[d.downstream_id]) blockedByMap[d.downstream_id] = [];
    if (!blocksMap[d.upstream_id]) blocksMap[d.upstream_id] = [];
    blockedByMap[d.downstream_id].push(d.upstream_id);
    blocksMap[d.upstream_id].push(d.downstream_id);
  });

  // Build tree: epics → tasks → subtasks
  const epicNodes = epicList.map(e => ({
    ...e,
    children: tasks
      .filter(t => t.parent_id === e.id)
      .sort((a, b) => a.priority - b.priority || a.title.localeCompare(b.title))
      .map(t => ({
        ...t,
        children: allSubtasks
          .filter(s => s.parent_id === t.id)
          .sort((a, b) => a.priority - b.priority || a.title.localeCompare(b.title))
      }))
  })).sort((a, b) => a.priority - b.priority || a.title.localeCompare(b.title));

  if (!epicNodes.length) {
    root.innerHTML = '<div class="empty-state">No items to display</div>';
    return;
  }

  root.innerHTML = '';

  function countChildren(node) {
    if (!node.children) return { total: 0, done: 0 };
    let total = 0, done = 0;
    node.children.forEach(c => {
      total++;
      if (c.status === 'done') done++;
    });
    return { total, done };
  }

  function shouldShow(item) {
    if (showDone) return true;
    if (item.status === 'done') {
      // Show if any child is not done
      if (item.children && item.children.some(c => c.status !== 'done')) return true;
      return false;
    }
    return true;
  }

  function renderNode(item, depth) {
    if (!shouldShow(item)) return null;

    const li = document.createElement('li');
    li.className = `tree-item depth-${depth}`;

    const row = document.createElement('div');
    row.className = 'tree-row';
    row.onclick = (e) => {
      if (e.target.closest('.tree-toggle')) return;
      openDrawer(item.id);
    };

    // Toggle arrow
    const toggle = document.createElement('span');
    const hasVisibleChildren = item.children && item.children.some(c => shouldShow(c));
    const isOpen = _treeOpenState[item.id] !== false; // default open
    toggle.className = 'tree-toggle' + (hasVisibleChildren ? (isOpen ? ' open' : '') : ' leaf');
    toggle.textContent = '\u25B6';
    toggle.onclick = (e) => {
      e.stopPropagation();
      _treeOpenState[item.id] = !isOpen;
      renderTree();
    };
    row.appendChild(toggle);

    // Type icon
    const icon = document.createElement('span');
    icon.className = 'tree-icon' + (item.type === 'epic' ? ' epic' : '');
    icon.style.background = item.type === 'epic' ? '#bc8cff' : (statusColors[item.status] || '#8b949e');
    row.appendChild(icon);

    // Ref
    if (item.ref) {
      const ref = document.createElement('span');
      ref.className = 'tree-ref';
      ref.textContent = item.ref;
      row.appendChild(ref);
    }

    // Title
    const title = document.createElement('span');
    title.className = 'tree-title' + (item.status === 'done' ? ' done' : '');
    title.style.fontWeight = item.type === 'epic' ? '600' : '400';
    title.textContent = item.title;
    row.appendChild(title);

    // Dependency badges
    if (showDeps) {
      const blocked = (blockedByMap[item.id] || []).filter(uid => taskMap[uid] && taskMap[uid].status !== 'done');
      const blocking = (blocksMap[item.id] || []).filter(did => taskMap[did] && taskMap[did].status !== 'done');
      blocked.forEach(uid => {
        const badge = document.createElement('span');
        badge.className = 'tree-dep-badge blocking';
        const ref = taskMap[uid]?.ref || uid.slice(0, 7);
        badge.textContent = 'blocked by ' + ref;
        row.appendChild(badge);
      });
      blocking.forEach(did => {
        const badge = document.createElement('span');
        badge.className = 'tree-dep-badge blocking';
        const ref = taskMap[did]?.ref || did.slice(0, 7);
        badge.textContent = 'blocks ' + ref;
        row.appendChild(badge);
      });
    }

    // Child progress
    if (item.children && item.children.length > 0) {
      const { total, done } = countChildren(item);
      const prog = document.createElement('span');
      prog.className = 'tree-progress';
      prog.textContent = `${done}/${total}`;
      row.appendChild(prog);
    }

    // Status badge
    const badge = document.createElement('span');
    badge.className = `tree-badge status-${item.status}`;
    badge.textContent = item.status === 'in_progress' ? 'active' : item.status;
    row.appendChild(badge);

    // Priority indicator for critical/high
    if (item.priority <= 1) {
      const pri = document.createElement('span');
      pri.className = 'tree-badge';
      pri.style.background = item.priority === 0 ? 'rgba(248,81,73,0.15)' : 'rgba(240,136,62,0.15)';
      pri.style.color = item.priority === 0 ? 'var(--red)' : 'var(--orange)';
      pri.textContent = item.priority === 0 ? 'P0' : 'P1';
      row.appendChild(pri);
    }

    li.appendChild(row);

    // Children
    if (hasVisibleChildren) {
      const childList = document.createElement('ul');
      childList.className = 'tree-list tree-children' + (isOpen ? '' : ' collapsed');
      item.children.forEach(child => {
        const childLi = renderNode(child, depth + 1);
        if (childLi) childList.appendChild(childLi);
      });
      li.appendChild(childList);
    }

    return li;
  }

  epicNodes.forEach(epic => {
    const li = renderNode(epic, 0);
    if (li) root.appendChild(li);
  });
}

function collapseDone() {
  allTasks.forEach(t => {
    if (t.status === 'done') _treeOpenState[t.id] = false;
  });
  renderTree();
}

function refreshGraphData() {
  renderTree();
}

// ── Drawer ──

async function openDrawer(taskId) {
  const info = allTasks.find(t => t.id === taskId);
  const audit = await fetchJSON('/api/audit/' + taskId);

  const body = document.getElementById('drawer-body');
  let html = '';

  if (info) {
    const blockedBy = deps.filter(d => d.downstream_id === taskId).map(d => d.upstream_id);
    const blocks = deps.filter(d => d.upstream_id === taskId).map(d => d.downstream_id);
    const depHtml = [
      ...blockedBy.map(id => `<span style="color:var(--red)">blocked by ${id}</span>`),
      ...blocks.map(id => `<span style="color:var(--orange)">blocks ${id}</span>`)
    ].join(' &middot; ');

    html += `<div class="drawer-task-info">
      <h3>${esc(info.title)}</h3>
      <div class="meta">
        <span class="status-dot status-${info.status}"></span> ${info.status}
        &middot; <span class="priority-badge priority-${info.priority}">${priorityLabels[info.priority]}</span>
        &middot; <span class="card-id">${info.id}</span>
        &middot; ${info.type}
      </div>
      ${depHtml ? `<div style="margin-top:6px;font-size:12px">${depHtml}</div>` : ''}
      ${info.notes ? `<p style="margin-top:8px;font-size:13px;color:var(--text-muted);line-height:1.5">${esc(info.notes)}</p>` : ''}
    </div>`;
  }

  html += '<h3 style="margin-bottom:12px;font-size:14px">Audit Trail</h3>';
  if (!audit || !audit.length) {
    html += '<p style="color:var(--text-muted);font-size:13px">No audit entries.</p>';
  } else {
    audit.forEach(e => {
      html += `<div class="audit-entry">
        <div>
          <span class="audit-field">${e.field}</span>
          <span class="audit-by audit-by-${e.changed_by}">${e.changed_by}</span>
          <span class="audit-time">${e.changed_at}</span>
        </div>
        <div class="audit-values">
          ${e.old_value ? `<span class="audit-old">${esc(e.old_value)}</span> → ` : ''}
          ${e.new_value ? `<span class="audit-new">${esc(e.new_value)}</span>` : '<span style="color:var(--red)">removed</span>'}
        </div>
      </div>`;
    });
  }

  body.innerHTML = html;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

document.getElementById('drawer-close').onclick = closeDrawer;
document.getElementById('drawer-overlay').onclick = closeDrawer;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ── Tabs ──

function switchTab(viewName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const tab = document.querySelector(`.tab[data-view="${viewName}"]`);
  if (tab) tab.classList.add('active');
  document.getElementById(viewName + '-view').classList.add('active');
  sessionStorage.setItem('werk-active-tab', viewName);
  if (viewName === 'graph') { renderTree(); }
  if (viewName === 'epics') renderEpics();
  if (viewName === 'board') renderBoard();
  if (viewName === 'decisions') renderDecisions();
  if (viewName === 'sessions') renderSessions();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => switchTab(tab.dataset.view);
});

// ── Utilities ──

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Sessions ──

function renderSessions() {
  const el = document.getElementById('sessions-list');
  if (!sessions.length) { el.innerHTML = '<div style="color:var(--text-muted);padding:24px;">No sessions yet.</div>'; return; }
  let html = '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
  html += '<tr style="border-bottom:1px solid var(--border);color:var(--text-muted);font-size:11px;text-transform:uppercase;"><th style="padding:8px;text-align:left;">ID</th><th style="padding:8px;text-align:left;">Started</th><th style="padding:8px;text-align:left;">Ended</th><th style="padding:8px;text-align:left;">Summary</th><th style="padding:8px;text-align:right;">Tasks</th></tr>';
  sessions.forEach(s => {
    let touched = [];
    try { touched = JSON.parse(s.tasks_touched || '[]'); } catch(e) { touched = s.tasks_touched || []; }
    const summary = s.summary ? esc(s.summary) : '<span style="color:var(--text-muted)">—</span>';
    const ended = s.ended_at || '<span style="color:var(--yellow)">active</span>';
    html += `<tr style="border-bottom:1px solid var(--border);"><td style="padding:8px;font-family:monospace;font-size:11px;">${esc(s.id)}</td><td style="padding:8px;">${esc(s.started_at)}</td><td style="padding:8px;">${ended}</td><td style="padding:8px;">${summary}</td><td style="padding:8px;text-align:right;">${touched.length}</td></tr>`;
  });
  html += '</table>';
  el.innerHTML = html;
}

// ── Search ──

function applySearch() {
  searchQuery = (document.getElementById('search-input').value || '').toLowerCase();
  const cards = document.querySelectorAll('.card, .epic-card, .decision-card, tr[data-searchable]');
  if (!searchQuery) {
    cards.forEach(c => c.style.display = '');
    return;
  }
  cards.forEach(c => {
    const text = (c.textContent || '').toLowerCase();
    c.style.display = text.includes(searchQuery) ? '' : 'none';
  });
}

// ── Init ──

const savedTab = sessionStorage.getItem('werk-active-tab');
if (savedTab && savedTab !== 'board') switchTab(savedTab);

loadData();
setInterval(loadData, 5000);
</script>
